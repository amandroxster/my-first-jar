name: CI - Build and Release JAR

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build JAR inside Build Container
        run: |
          podman run --rm \
            -v $(pwd):/app \
            -w /app \
            localhost/build-server \
            mvn clean package

      - name: Run Tests inside Build Container
        run: |
          podman run --rm \
            -v $(pwd):/app \
            -w /app \
            localhost/build-server \
            mvn test -DskipTests=false

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          files: target/my-app-1.0.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}