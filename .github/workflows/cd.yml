name: CD - Deploy to Podman

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Get latest release version
        id: get_version
        run: |
          LATEST=$(gh release list \
            --repo amandroxster/my-first-jar \
            --limit 1 \
            --json tagName \
            --jq '.[0].tagName')
          echo "version=$LATEST" >> $GITHUB_OUTPUT
          echo "=== Latest Release: $LATEST ==="

      - name: Download JAR from latest release
        run: |
          echo "=== Downloading ${{ steps.get_version.outputs.version }} ==="
          gh release download ${{ steps.get_version.outputs.version }} \
            --repo amandroxster/my-first-jar \
            --pattern "*.jar" \
            --clobber

      - name: Show downloaded JAR
        run: |
          echo "=== Downloaded JAR ==="
          ls -lh *.jar

      - name: Stop old container
        run: podman stop app-server || true

      - name: Remove old container
        run: podman rm app-server || true

      - name: Run new container with JAR
        run: |
          podman run -d \
            --name app-server \
            -v $(pwd)/my-app-1.0.jar:/app/app.jar \
            localhost/app-server

      - name: Verify deployment
        run: |
          echo "=== Running Containers ==="
          podman ps -a | grep app-server || true 

      - name: Show app logs
        if: always()
        run: |
          sleep 2
          echo "=== App Server Logs ==="
          podman logs app-server
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}